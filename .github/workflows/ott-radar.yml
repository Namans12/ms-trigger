name: OTT Radar

on:
  schedule:
    # 2:00 PM IST (8:30 UTC) every Wednesday and Friday
    - cron: "30 8 * * 3,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip Telegram/email, still update dashboard)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ott-radar
  cancel-in-progress: false

jobs:
  send-release-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OTT Radar
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          TELEGRAM_ENABLED: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ENABLED: "true"
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          REGION: IN
          LANGUAGES: hi,en
          POPULAR_MIN_POPULARITY: "25"
          RELEASE_TIMEZONE: Asia/Kolkata
          OUTPUT_DIR: docs
          DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python releasebot.py

      - name: Commit dashboard data
        run: |
          git config user.name "ott-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json docs/history.json
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update OTT Radar dashboard data [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
